<Doctype html!>
    <html>
        <head>
            <title>
                Add Course | Personal Course Organizer
            </title>
            <link rel="stylesheet" href="style.css">
        </head>
        <body>
            <header><h1>Personal Course Organizer</h1></header>
            <nav>
                <a href="index.html">Home</a>
                <a href="courses.html">My Courses</a>
                <a href="add-course.html">Add Course</a>
                <a href="contact.html">Contact Us</a>
            </nav>
            <main>
                <h2>Enroll New Course</h2>
                <form action="#">
                    <div class="form-group">
                        <label for="cname">Course Name</label>
                        <input type="text" id="cname" placeholder="e.g. Discrete Mathematics" required>
                    </div>
                    <div class="form-group">
                        <label for="inst">Instructor</label>
                        <input type="text" id="inst" required>
                    </div>
                    <div class="form-group">
                        <label for="hours">Credit Hours</label>
                        <input type="number" id="hours" min="1" max="5">
                    </div>
                    <div class="form-group">
                        <label for="notes">Notes:</label>
                        <textarea id="notes" rows="4" placeholder="Enter syllabus details or links..."></textarea>
                    </div>
                    <button type="submit">Save Course</button>
                </form>
            </main>
            <footer><p>&copy; 2026 Personal Course Organizer</p></footer>
        </body>
    </html>
</Doctype>
